<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-labelledby="markTitle">
  <title id="markTitle">Evitaas Merchants mark</title>
  <g stroke-linecap="round">
    <!-- diagonal single bars (dark) -->
    <g stroke="#2A1B3D" stroke-width="7">
      <line x1="62.0" y1="38.0" x2="74.8" y2="25.2"/>
      <line x1="62.0" y1="62.0" x2="74.8" y2="74.8"/>
      <line x1="38.0" y1="62.0" x2="25.2" y2="74.8"/>
      <line x1="38.0" y1="38.0" x2="25.2" y2="25.2"/>
    </g>
    <!-- cardinal X shapes (two-tone) -->
    <g stroke="#7B4C86" stroke-width="7">
      <line x1="43.5" y1="17.5" x2="56.5" y2="30.5"/>
      <line x1="69.5" y1="43.5" x2="82.5" y2="56.5"/>
      <line x1="43.5" y1="69.5" x2="56.5" y2="82.5"/>
      <line x1="17.5" y1="43.5" x2="30.5" y2="56.5"/>
    </g>
    <g stroke="#C99FC9" stroke-width="7">
      <line x1="43.5" y1="30.5" x2="56.5" y2="17.5"/>
      <line x1="69.5" y1="56.5" x2="82.5" y2="43.5"/>
      <line x1="43.5" y1="82.5" x2="56.5" y2="69.5"/>
      <line x1="17.5" y1="56.5" x2="30.5" y2="43.5"/>
    </g>
  </g>
</svg>
